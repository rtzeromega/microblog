<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到正文</a>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav aria-label="主导航">
          <ul class="nav-list">
            <li><a href="{{ '/' | relative_url }}">首页</a></li>
            <li><a href="{{ '/about/' | relative_url }}">关于</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main-content" class="wrap">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p>© {{ site.time | date: '%Y' }} {{ site.title }}. Built with Markdown and GitHub Pages.</p>
      </div>
    </footer>
  </body>
</html>
