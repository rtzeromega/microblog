title: RT Zero Mega
description: Personal blog about engineering, experiments, and notes.
url: "https://rtzeromega.github.io"
baseurl: "/microblog"
lang: zh-CN
timezone: Asia/Shanghai
markdown: kramdown
permalink: /posts/:year/:month/:day/:title/
collections:
  pages:
    output: true
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: posts
    values:
      layout: post
